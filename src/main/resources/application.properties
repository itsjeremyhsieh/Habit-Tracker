spring.application.name=habit-tracker

# Database Configuration - Read from environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/habit_tracker_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.springframework.transaction.support=DEBUG

# JWT Configuration - Read from environment variables
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.jwt.cookie-name=${APP_JWT_COOKIE_NAME:habit_tracker_jwt}
app.jwt.cookie-secure=${APP_JWT_COOKIE_SECURE:false}

server.forward-headers-strategy=framework